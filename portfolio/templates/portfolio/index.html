{% if post_list %}
<ul>
    {% for post in post_list %}
    <li><a href="{% url 'portfolio:view_post' post.id %}">{{ post.title }}</a></li>
    {% endfor %}
</ul>
{% else %}
<p>No posts are available.</p>
{% endif %}

{% if user.is_authenticated %}
<a href="{% url 'portfolio:create_post' %}">Create post</a>
<a href="{% url 'portfolio:logout' %}">Logout</a>
{% endif %}
