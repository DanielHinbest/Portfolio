{% extends 'portfolio/base.html' %}
{% block content %}
<h1>{{ post.title }}</h1>
<ul>
    <li>{{ post.content }}</li>
</ul>

{% if user.is_authenticated %}
<a href="{% url 'portfolio:edit_post' post.id %}">Edit post</a>
<a href="{% url 'portfolio:delete_post' post.id %}">Delete post</a>
<a href="{% url 'portfolio:logout' %}">Logout</a>
{% endif %}
{% endblock %}
